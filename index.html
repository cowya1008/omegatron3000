<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>NCT WISH Cute Page</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: linear-gradient(to bottom, #d4f8e8, #a0e7e5);
      font-family: "Comic Sans MS", cursive;
    }

    h1 {
      text-align: center;
      margin-top: 20px;
      color: #2b7a78;
    }

    .character {
      position: absolute;
      width: 120px;
      text-align: center;
      animation: float 4s ease-in-out infinite;
    }

    .bubble {
      background: white;
      border-radius: 50%;
      padding: 20px;
      box-shadow: 0 5px 10px rgba(0,0,0,0.1);
      font-size: 14px;
    }

    .name {
      margin-top: 8px;
      font-weight: bold;
      color: #116466;
    }

    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-20px); }
      100% { transform: translateY(0px); }
    }

    /* Positions */
    .c1 { top: 10%; left: 10%; animation-delay: 0s; }
    .c2 { top: 20%; left: 70%; animation-delay: 1s; }
    .c3 { top: 50%; left: 15%; animation-delay: 2s; }
    .c4 { top: 60%; left: 75%; animation-delay: 0.5s; }
    .c5 { top: 35%; left: 40%; animation-delay: 1.5s; }
    .c6 { top: 75%; left: 45%; animation-delay: 2.5s; }

  </style>
</head>
<body>

<h1>✨ NCT WISH Hangout ✨</h1>

<div class="character c1">
  <div class="bubble">💚</div>
  <div class="name">Sion</div>
</div>

<div class="character c2">
  <div class="bubble">🌟</div>
  <div class="name">Riku</div>
</div>

<div class="character c3">
  <div class="bubble">🍀</div>
  <div class="name">Yushi</div>
</div>

<div class="character c4">
  <div class="bubble">🧸</div>
  <div class="name">Jaehee</div>
</div>

<div class="character c5">
  <div class="bubble">🎧</div>
  <div class="name">Ryo</div>
</div>

<div class="character c6">
  <div class="bubble">✨</div>
  <div class="name">Sakuya</div>
</div>

</body>
</html>
