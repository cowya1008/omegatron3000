<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Happy Otter & Shrimp</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(to top, #a0e7e5, #b4f8c8);
      font-family: "Comic Sans MS", cursive;
      overflow: hidden;
    }

    .scene {
      text-align: center;
      position: relative;
    }

    .title-img {
      width: 180px;
      margin-bottom: 10px;
      animation: float 3s infinite ease-in-out;
    }

    h1 {
      color: #2b7a78;
      margin-bottom: 20px;
    }

    .otter {
      font-size: 80px;
      animation: bounce 2s infinite ease-in-out;
    }

    .shrimp {
      font-size: 50px;
      position: absolute;
      left: 60%;
      top: 40%;
      animation: float 3s infinite ease-in-out;
    }

    .heart {
      position: absolute;
      font-size: 20px;
      animation: rise 3s infinite;
      opacity: 0.8;
    }

    .heart:nth-child(1) { left: 45%; top: 60%; animation-delay: 0s; }
    .heart:nth-child(2) { left: 55%; top: 65%; animation-delay: 1s; }
    .heart:nth-child(3) { left: 50%; top: 70%; animation-delay: 2s; }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-15px) rotate(10deg); }
    }

    @keyframes rise {
      0% { transform: translateY(0); opacity: 0.8; }
      100% { transform: translateY(-80px); opacity: 0; }
    }
  </style>
</head>
<body>

<div class="scene">
  <!-- Your image title -->
  <img src="nunung.png" alt="Nunung Title" class="title-img">

  <h1>🦦 Otter Loves Shrimp 🦐</h1>

  <div class="otter">🦦</div>
  <div class="shrimp">🦐</div>

  <div class="heart">💚</div>
  <div class="heart">💚</div>
  <div class="heart">💚</div>
</div>

</body>
</html>
